services:
  mariadb:
    image: mariadb:11
    container_name: claude-mariadb
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: claude
      MARIADB_USER: claude
      MARIADB_PASSWORD: claude
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql

volumes:
  mariadb_data: