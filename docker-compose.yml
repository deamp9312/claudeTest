services:
  server1:
    build:
      context: .
      dockerfile: server1/Dockerfile
    container_name: server1
    ports:
      - "8080:8080"
    depends_on:
      - server2

  server2:
    build:
      context: .
      dockerfile: server2/Dockerfile
    container_name: server2
    ports:
      - "8081:8080"

  mariadb:
    image: mariadb:11
    container_name: claude-mariadb
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: claude
      MARIADB_USER: claude
      MARIADB_PASSWORD: claude
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql

volumes:
  mariadb_data:
